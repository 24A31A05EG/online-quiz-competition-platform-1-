<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - QuizNova</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div id="popup-message" class="popup"></div>

<nav class="navbar">
    <div class="logo">
        <i class="fas fa-brain"></i> QuizNova
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
        <a href="register.html" class="register-btn active">Register</a>
    </div>
</nav>

<section class="auth-wrapper">

    <div class="auth-card">

        <h2>Create Account</h2>
        <p class="auth-subtitle">Start your learning journey today</p>

        <form id="registerForm">

            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username" required>

            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" required>

            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>

            <!-- ✅ FIXED CHECKBOX -->
            <label class="checkbox-row">
                <input type="checkbox" id="terms" required>
                <span>I agree to the Terms and Conditions</span>
            </label>

            <button type="submit" class="auth-btn">Create Account</button>

            <p class="switch-text">
                Already have an account?
                <a href="login.html">Sign in here</a>
            </p>

        </form>

    </div>

</section>

<footer class="footer">
    <h3>QuizNova</h3>
    <p>Challenge yourself with exciting quizzes and track your performance in real time.</p>
</footer>

<script src="js/register.js"></script>

</body>
</html>
